<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tortuga de Orejas Rojas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>
            <img src="img/logo.png" alt="Logo tortuga" class="logo">
            Tortuga de Orejas Rojas
            <img src="img/logo.png" alt="Logo tortuga" class="logo">
        </h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="caracteristicas.html">Características</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <main>
        <h2>Contacto</h2>
        <form>
            <div class="fila">
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="campo">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>
            </div>

            <div class="campo correo">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" required>
            </div>

            <div class="campo">
                <label for="fecha">Fecha de nacimiento:</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="campo">
                <label for="comentarios">Comentarios:</label>
                <textarea id="comentarios" name="comentarios" rows="5" placeholder="Escribe aquí tu mensaje..."></textarea>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>Magda - Programación Front End &copy; 2026</p>
    </footer>
</body>
</html>
